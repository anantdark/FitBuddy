# Publish a tagged FOSS APK for F-Droid reproducible builds (Binaries / AllowedAPKSigningKeys).
name: F-Droid Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to build and publish (e.g. v3.1.0)
        required: true
        type: string

concurrency:
  group: fdroid-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create local.properties
        # Match F-Droid CI: sdk path only — no Sentry/Mongo secrets (those change BuildConfig/DEX).
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Configure release signing
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ] || [ -z "$RELEASE_STORE_PASSWORD" ] \
            || [ -z "$RELEASE_KEY_ALIAS" ] || [ -z "$RELEASE_KEY_PASSWORD" ]; then
            echo "::error::Missing RELEASE_* secrets."
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > fitbuddy-release.jks
          printf '%s\n' \
            "storeFile=fitbuddy-release.jks" \
            "storePassword=${RELEASE_STORE_PASSWORD}" \
            "keyAlias=${RELEASE_KEY_ALIAS}" \
            "keyPassword=${RELEASE_KEY_PASSWORD}" \
            > keystore.properties

      - name: Read version from Gradle
        id: version
        run: |
          # versionCode/versionName for this flavor live in the fdroid productFlavor block,
          # not defaultConfig (which holds the CI-driven github values).
          VERSION_NAME=$(awk '/create\("fdroid"\)/,/^        }/' app/build.gradle.kts | sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' | head -1)
          VERSION_CODE=$(awk '/create\("fdroid"\)/,/^        }/' app/build.gradle.kts | sed -n 's/.*versionCode = \([0-9]*\).*/\1/p' | head -1)
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "Building ${VERSION_NAME} (${VERSION_CODE}) from ${{ inputs.tag }}"

      - name: Build release APK
        # Intentionally no SENTRY_DSN / MONGO_* — must match unsigned F-Droid CI output.
        run: ./gradlew :app:assembleFdroidRelease --no-daemon

      - name: Upload R8 mapping (crash deobfuscation)
        uses: actions/upload-artifact@v4
        with:
          name: mapping-fdroid-${{ steps.version.outputs.version_code }}
          path: app/build/outputs/mapping/fdroidRelease/mapping.txt
          retention-days: 90

      # Do NOT own GitHub "Latest" — site + in-app updater use CI tags (v*-buildN).
      # F-Droid installs via Binaries URL on this tag, not /releases/latest.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: FitBuddy ${{ steps.version.outputs.version_name }} (F-Droid)
          body: |
            FOSS build for F-Droid reproducible builds.

            - **versionName:** ${{ steps.version.outputs.version_name }}
            - **versionCode:** ${{ steps.version.outputs.version_code }}
            - **tag:** `${{ inputs.tag }}`
            - Signed with the FitBuddy release key (`AllowedAPKSigningKeys`).

            Not for sideload / website downloads — use a `v*-buildN` GitHub Release for those.
          draft: false
          prerelease: true
          make_latest: false
          files: |
            app/build/outputs/apk/fdroid/release/FitBuddy-${{ steps.version.outputs.version_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
