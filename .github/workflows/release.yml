name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" >> local.properties

      - name: Detect release signing
        id: signing
        env:
          KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure release signing
        if: steps.signing.outputs.enabled == 'true'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > fitbuddy-release.jks
          cat > keystore.properties <<EOF
          storeFile=fitbuddy-release.jks
          storePassword=${RELEASE_STORE_PASSWORD}
          keyAlias=${RELEASE_KEY_ALIAS}
          keyPassword=${RELEASE_KEY_PASSWORD}
          EOF

      - name: Build release APK
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Extract version metadata
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed -E 's/[^0-9]*([0-9]+).*/\1/')
          TAG="v${VERSION_NAME}-build${GITHUB_RUN_NUMBER}"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        id: notes
        run: |
          {
            echo "notes<<EOF"
            echo "## FitBuddy ${VERSION_NAME} (build ${GITHUB_RUN_NUMBER})"
            echo
            echo "**Version code:** ${VERSION_CODE}"
            echo "**Commit:** [\`${GITHUB_SHA::7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
            echo
            echo "### Recent commits"
            git log -10 --pretty=format:'- %s (%h)' --no-merges
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FitBuddy ${{ steps.version.outputs.version_name }} (build ${{ github.run_number }})
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
