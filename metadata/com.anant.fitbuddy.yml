MaintainerNotes: |
  Default branch is fdroid. Tags for F-Droid must be clean vX.Y.Z
  (no -buildN CI tags). UpdateCheckMode Tags regex skips CI release tags.
  GitHub Releases on main use CI build tags (v*-build*) and own /releases/latest.
  FOSS binaries for reproducible builds are published from clean tags via the
  F-Droid Release workflow (prerelease + make_latest: false) so they never
  become the website / in-app update target. Install via Binaries URL only.

  As of the versionCode 58 (3.1.2) release, this branch shares the same app
  source as develop/main (a `distribution` Gradle product flavor dimension
  replaces the old stripped-down fork). Builds entries from that version
  onward must set `gradle: - fdroid` (not `yes`) so fdroidserver builds the
  `fdroid` flavor (assembleFdroidRelease), which fixes the versionCode/
  versionName since F-Droid's from-source build has no CI -P overrides.
  Sentry and MongoDB Atlas cloud backup are now compiled in (off by default,
  user-toggleable) rather than removed — see AntiFeatures.

AutoUpdateMode: Version
