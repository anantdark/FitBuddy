AntiFeatures:
  NonFreeNet:
    en-US: Optional AI providers (OpenRouter, Gemini, Ollama Cloud) contact proprietary
      network services when the user enables them. Core logging works offline via
      the built-in simulator. Cloud backup (opt-in) also relays through a proprietary
      MongoDB Atlas-backed proxy.
  Tracking:
    en-US: Bundles the Sentry crash-reporting SDK. Off by default on this build; users
      can enable it under Settings → Crash reports for anonymous, PII-scrubbed crash
      reports only (no analytics/ads tracking).
