MaintainerNotes: |
  Default branch is fdroid. Tags for F-Droid must be clean vX.Y.Z
  (no -buildN CI tags). UpdateCheckMode Tags regex skips CI release tags.
  GitHub Releases on main use CI build tags (v*-build*) and own /releases/latest.
  FOSS binaries for reproducible builds are published from clean tags via the
  F-Droid Release workflow (prerelease + make_latest: false) so they never
  become the website / in-app update target. Install via Binaries URL only.
  F-Droid builds omit Sentry, MongoDB Atlas cloud backup, and the in-app
  GitHub APK updater (full builds are on GitHub Releases).

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[0-9.]+$
